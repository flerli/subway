services:
  backend:
    build:
      context: ./backend
    image: ${BACKEND_IMAGE:-subway-backend:local}
    depends_on:
      - bring-sidecar
      - roborock-sidecar
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      WEATHER_LATITUDE: ${WEATHER_LATITUDE:-52.52}
      WEATHER_LONGITUDE: ${WEATHER_LONGITUDE:-13.405}
      WEATHER_LOCATION: ${WEATHER_LOCATION:-Berlin}
      WEATHER_TIMEZONE: ${WEATHER_TIMEZONE:-auto}
      BRING_SIDECAR_URL: ${BRING_SIDECAR_URL:-http://bring-sidecar:8788}
      BRING_CREDENTIAL_ENCRYPTION_KEY: ${BRING_CREDENTIAL_ENCRYPTION_KEY:-}
      ROBOROCK_SIDECAR_URL: ${ROBOROCK_SIDECAR_URL:-http://roborock-sidecar:8789}
      ROBOROCK_SESSION_ENCRYPTION_KEY: ${ROBOROCK_SESSION_ENCRYPTION_KEY:-}
    volumes:
      - subway-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/api/auth/session').then((response) => { if (!response.ok) { throw new Error('unhealthy') } }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  bring-sidecar:
    build:
      context: ./backend/bring_sidecar
    image: ${BRING_SIDECAR_IMAGE:-subway-bring-sidecar:local}
    environment:
      HOST: 0.0.0.0
      PORT: 8788
    restart: unless-stopped

  roborock-sidecar:
    build:
      context: ./backend/roborock_sidecar
    image: ${ROBOROCK_SIDECAR_IMAGE:-subway-roborock-sidecar:local}
    environment:
      HOST: 0.0.0.0
      PORT: 8789
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    image: ${FRONTEND_IMAGE:-subway-frontend:local}
    depends_on:
      - backend
    ports:
      - ${APP_PORT:-8081}:80
    restart: unless-stopped

volumes:
  subway-data:
    driver: local
